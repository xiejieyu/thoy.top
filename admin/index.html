<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科赛帝尔 · 极简后台</title>
  <!-- logo 位于根目录 -->
  <link rel="icon" type="image/x-icon" href="/科赛帝尔.ico">
  <link rel="shortcut icon" href="/科赛帝尔.ico" type="image/x-icon">
  <!-- 字体 Inter 干净简洁 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f2f9;
      color: #1e1a2b;
      min-height: 100vh;
    }

    /* 极简布局 */
    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* 登录卡片 - 干净白 */
    .login-card {
      max-width: 360px;
      margin: 10vh auto;
      background: white;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid #f0eaf8;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area img {
      height: 48px;
      width: auto;
    }

    .logo-area h2 {
      font-weight: 500;
      font-size: 1.4rem;
      color: #2c2640;
      margin-top: 0.5rem;
    }

    .input-group {
      margin-bottom: 1.25rem;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #4b4463;
      margin-bottom: 0.3rem;
      margin-left: 0.2rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e3ddf2;
      border-radius: 16px;
      font-size: 1rem;
      transition: 0.1s;
      background: white;
    }

    .input-group input:focus {
      outline: none;
      border-color: #8f7ace;
      box-shadow: 0 0 0 3px rgba(143, 122, 206, 0.1);
    }

    .login-btn {
      width: 100%;
      background: #2c2640;
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 20px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.1s;
    }

    .login-btn:hover {
      background: #3f3660;
    }

    .error-msg {
      color: #d14c6d;
      font-size: 0.9rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }

    /* 后台主界面 */
    .admin-panel {
      display: none;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      background: white;
      padding: 1rem 2rem;
      border-radius: 40px;
      border: 1px solid #eee8fc;
    }

    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .admin-header-left img {
      height: 40px;
    }

    .admin-header-left span {
      font-weight: 600;
      color: #2c2640;
      font-size: 1.2rem;
    }

    .logout-btn {
      background: none;
      border: 1.5px solid #ddd6f0;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      color: #4b4463;
      font-weight: 500;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #f6f2ff;
    }

    /* 统计卡片极简 */
    .stats-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 1.2rem 2rem;
      border: 1px solid #f0eaf8;
      flex: 1;
    }

    .stat-card .label {
      font-size: 0.85rem;
      color: #7b6d9a;
      margin-bottom: 0.3rem;
    }

    .stat-card .number {
      font-size: 2.2rem;
      font-weight: 500;
      color: #2c2640;
    }

    /* 账号管理区 - 极简 */
    .admin-section {
      background: white;
      border-radius: 28px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      border: 1px solid #f0eaf8;
    }

    .section-title {
      font-weight: 500;
      font-size: 1.1rem;
      color: #4b4463;
      margin-bottom: 1.5rem;
      letter-spacing: -0.2px;
    }

    .user-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .user-tag {
      background: #f2edff;
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .user-tag span {
      color: #2c2640;
    }

    .delete-user {
      background: none;
      border: none;
      color: #b8aede;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
    }

    .delete-user:hover {
      color: #d14c6d;
    }

    .add-user-form {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 1rem;
    }

    .add-user-form input {
      padding: 0.6rem 1.2rem;
      border: 1.5px solid #e3ddf2;
      border-radius: 30px;
      font-size: 0.9rem;
      background: white;
    }

    .add-user-form button {
      background: #2c2640;
      color: white;
      border: none;
      padding: 0.6rem 2rem;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
    }

    /* 数据表格 - 极简干净 */
    .data-table-section {
      background: white;
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid #f0eaf8;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .clear-btn {
      background: none;
      border: 1.5px solid #f0c4d4;
      color: #b45a78;
      padding: 0.4rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 0.8rem 0.5rem;
      color: #7b6d9a;
      font-weight: 500;
      font-size: 0.85rem;
      border-bottom: 1px solid #f0eaf8;
    }

    td {
      padding: 1rem 0.5rem;
      border-bottom: 1px solid #f7f2ff;
      color: #2c2640;
      font-size: 0.95rem;
    }

    .file-badge {
      background: #f2edff;
      border-radius: 20px;
      padding: 0.2rem 1rem;
      font-size: 0.8rem;
      display: inline-block;
      margin: 0.1rem;
    }

    .signature-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot-signed {
      width: 8px;
      height: 8px;
      background: #5bb381;
      border-radius: 10px;
    }

    .action-btn {
      background: none;
      border: 1.5px solid #ddd6f0;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      margin: 0.2rem;
      color: #4b4463;
    }

    .action-btn.income {
      background: #2c2640;
      border-color: #2c2640;
      color: white;
    }

    .action-btn.income:disabled {
      background: #e0d9f0;
      border-color: #e0d9f0;
      color: #a298b5;
      cursor: not-allowed;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-card {
      background: white;
      border-radius: 32px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .modal-card h3 {
      margin-bottom: 1.5rem;
      font-weight: 500;
      color: #2c2640;
    }

    .file-list {
      background: #f8f5ff;
      border-radius: 20px;
      padding: 1.2rem;
      margin: 1rem 0;
    }

    .file-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #e7defa;
    }

    .file-row:last-child {
      border-bottom: none;
    }

    .download-link {
      color: #6d5a9a;
      text-decoration: none;
      font-weight: 500;
    }

    .close-modal {
      background: #f0eaf8;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 30px;
      margin-top: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 登录界面 (无自动填充) -->
    <div id="loginPanel" class="login-card">
      <div class="logo-area">
        <img src="/科赛帝尔.png" alt="科赛帝尔">
        <h2>后台管理</h2>
      </div>
      <div class="input-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="输入用户名" autocomplete="off">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="输入密码" autocomplete="off">
      </div>
      <button class="login-btn" id="loginBtn">登录</button>
      <div id="loginError" class="error-msg">用户名或密码错误</div>
    </div>

    <!-- 后台主界面 (初始隐藏) -->
    <div id="adminPanel" class="admin-panel">
      <!-- 头部 -->
      <div class="admin-header">
        <div class="admin-header-left">
          <img src="/科赛帝尔.png" alt="">
          <span>科赛帝尔 · 极简后台</span>
        </div>
        <button class="logout-btn" id="logoutBtn">退出</button>
      </div>

      <!-- 统计卡片 -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">总登记</div>
          <div class="number" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="label">已收入</div>
          <div class="number" id="incomeCount">0</div>
        </div>
        <div class="stat-card">
          <div class="label">待处理</div>
          <div class="number" id="pendingCount">0</div>
        </div>
      </div>

      <!-- 账号管理 (极简) -->
      <div class="admin-section">
        <div class="section-title">👥 账号管理</div>
        <div id="userList" class="user-grid"></div>
        <div class="add-user-form">
          <input type="text" id="newUsername" placeholder="新用户名">
          <input type="password" id="newPassword" placeholder="密码">
          <button id="addUserBtn">添加账号</button>
        </div>
      </div>

      <!-- 数据表格 -->
      <div class="data-table-section">
        <div class="table-header">
          <div class="section-title">📋 登记数据</div>
          <button class="clear-btn" id="clearDataBtn">清空数据</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>申请人</th>
              <th>联系方式</th>
              <th>作品</th>
              <th>文件</th>
              <th>签名</th>
              <th>收入状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="dataTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 详情弹窗 (查看材料+导出签名) -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-card" id="detailModal">
        <h3 id="modalTitle">材料详情</h3>
        <div id="modalContent"></div>
        <button class="close-modal" id="closeModal">关闭</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ========== 模拟云端存储 (localStorage 模拟云端，实际应替换为API) ==========
      let submissions = JSON.parse(localStorage.getItem('cloud_submissions')) || [
        { 
          id: 'S001', name:'李沐', phone:'17649864014', email:'us@thoy.top', address:'吉林省长春市',
          workName:'星穹纪元设定集', completionDate:'2025-08-15',
          idFiles:['身份证正面.jpg', '身份证背面.jpg'], workFiles:['设定集.docx', '地图.png'],
          signature: true, signatureData: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...', // 模拟签名
          incomeBy: null  // null 表示未收入
        },
        { 
          id: 'S002', name:'星尘工作室', phone:'13944112233', email:'xingchen@oc.com', address:'北京',
          workName:'人设图鉴', completionDate:'2026-01-20',
          idFiles:['营业执照.jpg'], workFiles:['图鉴.pdf'],
          signature: true, signatureData: 'data:image/png;base64,...',
          incomeBy: null
        },
        { 
          id: 'S003', name:'赵梦琪', phone:'15233448899', email:'mengqi@foxmail.com', address:'上海',
          workName:'钢琴曲集', completionDate:'2025-12-10',
          idFiles:['身份证.jpg'], workFiles:['曲谱.pdf', 'demo.mp3'],
          signature: false, signatureData: null,
          incomeBy: 'admin'  // 模拟已由admin收入
        }
      ];

      let adminUsers = JSON.parse(localStorage.getItem('cloud_admin')) || [
        { username: 'admin', password: 'admin123' }  // 初始账号，不自动填充
      ];

      let currentUser = null; // 当前登录的管理员

      function saveSubmissions() {
        localStorage.setItem('cloud_submissions', JSON.stringify(submissions));
      }
      function saveAdmin() {
        localStorage.setItem('cloud_admin', JSON.stringify(adminUsers));
      }

      // ========== 登录逻辑 (无自动填充) ==========
      const loginPanel = document.getElementById('loginPanel');
      const adminPanel = document.getElementById('adminPanel');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      loginBtn.addEventListener('click', function() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const user = adminUsers.find(u => u.username === username && u.password === password);
        if (user) {
          currentUser = username;
          loginPanel.style.display = 'none';
          adminPanel.style.display = 'block';
          loginError.style.display = 'none';
          renderDashboard();
        } else {
          loginError.style.display = 'block';
        }
      });

      // 退出
      document.getElementById('logoutBtn').addEventListener('click', function() {
        adminPanel.style.display = 'none';
        loginPanel.style.display = 'block';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        currentUser = null;
      });

      // ========== 账号管理 ==========
      function renderUserList() {
        const container = document.getElementById('userList');
        container.innerHTML = adminUsers.map(u => `
          <div class="user-tag">
            <span>${u.username}</span>
            ${u.username !== 'admin' ? 
              `<button class="delete-user" onclick="deleteUser('${u.username}')">✕</button>` : 
              '<span style="color:#aaa;">(主)</span>'}
          </div>
        `).join('');
      }

      window.deleteUser = function(username) {
        if (username === 'admin') {
          alert('主账号不能删除');
          return;
        }
        if (confirm(`删除账号 ${username}？`)) {
          adminUsers = adminUsers.filter(u => u.username !== username);
          saveAdmin();
          renderUserList();
        }
      };

      document.getElementById('addUserBtn').addEventListener('click', function() {
        const newUser = document.getElementById('newUsername').value.trim();
        const newPass = document.getElementById('newPassword').value.trim();
        if (newUser && newPass) {
          if (adminUsers.find(u => u.username === newUser)) {
            alert('用户名已存在');
            return;
          }
          adminUsers.push({ username: newUser, password: newPass });
          saveAdmin();
          renderUserList();
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
        }
      });

      // ========== 清空数据 ==========
      document.getElementById('clearDataBtn').addEventListener('click', function() {
        if (confirm('清空所有登记数据？')) {
          submissions = [];
          saveSubmissions();
          renderDashboard();
        }
      });

      // ========== 收入按钮逻辑 ==========
      window.incomeSubmission = function(id) {
        const sub = submissions.find(s => s.id === id);
        if (!sub) return;
        if (sub.incomeBy) {
          alert('此信息已被 ' + sub.incomeBy + ' 收入');
          return;
        }
        if (!currentUser) {
          alert('请重新登录');
          return;
        }
        sub.incomeBy = currentUser;
        saveSubmissions();
        renderDashboard();
        alert(`信息已由 ${currentUser} 收入，其他账号无法再收入`);
      };

      // ========== 查看材料 + 导出签名 ==========
      window.viewMaterials = function(id) {
        const sub = submissions.find(s => s.id === id);
        if (!sub) return;
        const modalContent = document.getElementById('modalContent');
        const title = document.getElementById('modalTitle');
        title.innerText = `材料详情 - ${sub.name}`;

        let filesHtml = '<div class="file-list"><h4>📎 上传文件</h4>';
        filesHtml += '<p><strong>身份证明：</strong></p>';
        sub.idFiles.forEach(f => {
          filesHtml += `<div class="file-row"><span>${f}</span> <a href="#" class="download-link" onclick="alert('模拟下载 ${f}')">下载</a></div>`;
        });
        filesHtml += '<p style="margin-top:1rem;"><strong>作品文件：</strong></p>';
        sub.workFiles.forEach(f => {
          filesHtml += `<div class="file-row"><span>${f}</span> <a href="#" class="download-link" onclick="alert('模拟下载 ${f}')">下载</a></div>`;
        });
        filesHtml += '</div>';

        let signatureHtml = '';
        if (sub.signature && sub.signatureData) {
          signatureHtml = `
            <div style="margin-top:1.5rem;">
              <h4>✍️ 签名</h4>
              <img src="${sub.signatureData}" alt="签名" style="max-width:200px; border:1px solid #eee; border-radius:12px; padding:8px;">
              <button class="action-btn" style="margin-left:1rem;" onclick="exportSignature('${id}')">导出签名</button>
            </div>
          `;
        } else {
          signatureHtml = '<p style="margin-top:1rem;">❌ 未签名</p>';
        }

        modalContent.innerHTML = filesHtml + signatureHtml;
        document.getElementById('modalOverlay').style.display = 'flex';
      };

      window.exportSignature = function(id) {
        const sub = submissions.find(s => s.id === id);
        if (!sub || !sub.signatureData) {
          alert('无签名数据');
          return;
        }
        // 模拟导出 (实际可转为文件下载)
        const link = document.createElement('a');
        link.href = sub.signatureData;
        link.download = `signature_${sub.name}.png`;
        link.click();
      };

      document.getElementById('closeModal').addEventListener('click', function() {
        document.getElementById('modalOverlay').style.display = 'none';
      });

      // ========== 渲染仪表盘 ==========
      function renderDashboard() {
        const total = submissions.length;
        const incomeCount = submissions.filter(s => s.incomeBy).length;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('incomeCount').innerText = incomeCount;
        document.getElementById('pendingCount').innerText = total - incomeCount;

        const tbody = document.getElementById('dataTbody');
        tbody.innerHTML = submissions.map(sub => {
          const isIncomed = sub.incomeBy !== null;
          const incomeLabel = isIncomed ? `已收入 (${sub.incomeBy})` : '未收入';
          return `
          <tr>
            <td>${sub.name}</td>
            <td>${sub.phone}<br><span style="font-size:0.75rem; color:#7b6d9a;">${sub.email}</span></td>
            <td>${sub.workName}</td>
            <td>
              <span class="file-badge">📎 ${sub.idFiles.length}</span>
              <span class="file-badge">📄 ${sub.workFiles.length}</span>
            </td>
            <td><div class="signature-indicator"><span class="dot-signed" style="background:${sub.signature ? '#5bb381' : '#ddd'}"></span>${sub.signature ? '已签' : '未签'}</div></td>
            <td>${incomeLabel}</td>
            <td>
              <button class="action-btn" onclick="viewMaterials('${sub.id}')">查看材料</button>
              <button class="action-btn income" onclick="incomeSubmission('${sub.id}')" ${isIncomed ? 'disabled' : ''}>收入</button>
            </td>
          </tr>
        `}).join('');

        renderUserList();
      }

      // 初始化渲染
      renderUserList();
    })();
  </script>
</body>
</html>
