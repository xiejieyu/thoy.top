<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科赛帝尔 · 云端登记</title>
  <!-- favicon -->
  <link rel="icon" type="image/x-icon" href="/科赛帝尔.ico">
  <link rel="shortcut icon" href="/科赛帝尔.ico" type="image/x-icon">
  <!-- 字体 Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6fc;
      color: #1e1a2b;
      line-height: 1.5;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      background: white;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      border: 1px solid #edeaf5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo img {
      height: 36px;
      width: auto;
    }

    .logo span {
      font-weight: 500;
      font-size: 1.2rem;
      color: #2c2640;
      letter-spacing: -0.3px;
    }

    .badge {
      background: #f0ebff;
      color: #5b4b8a;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* 标题 */
    .page-title {
      margin-bottom: 2rem;
    }

    .page-title h1 {
      font-size: 2.4rem;
      font-weight: 500;
      color: #1e1a2b;
      letter-spacing: -0.5px;
    }

    .page-title p {
      color: #6b5f8a;
      margin-top: 0.2rem;
    }

    /* 卡片 */
    .form-card {
      background: white;
      border-radius: 32px;
      padding: 2.2rem;
      border: 1px solid #f0ecf9;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #2c2640;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid #f0ebff;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #5b4f78;
      margin-left: 0.2rem;
    }

    .form-group input,
    .form-group textarea {
      padding: 0.9rem 1.2rem;
      border: 1.5px solid #e8e2f2;
      border-radius: 20px;
      font-size: 0.95rem;
      transition: 0.1s;
      background: white;
      font-family: 'Inter', sans-serif;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #b4a3e6;
      box-shadow: 0 0 0 3px rgba(180, 163, 230, 0.15);
    }

    /* 上传区域 */
    .upload-area {
      background: #f9f7ff;
      border: 2px dashed #d9cfff;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .upload-area:hover {
      background: #f2edff;
      border-color: #b4a3e6;
    }

    .upload-area input[type="file"] {
      display: none;
    }

    .upload-icon {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .upload-text {
      color: #5b4f78;
      font-weight: 500;
    }

    .file-list {
      margin-top: 1rem;
    }

    .file-item {
      background: #f3effa;
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      margin: 0.4rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    /* 签名区域 */
    .signature-pad {
      background: white;
      border: 2px solid #e8e2f2;
      border-radius: 24px;
      padding: 1rem;
    }

    canvas {
      width: 100%;
      height: 140px;
      background: white;
      border-radius: 16px;
      cursor: crosshair;
      touch-action: none;
      border: 1px solid #f0eaf8;
    }

    .signature-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid #e0d7f0;
      padding: 0.6rem 2rem;
      border-radius: 40px;
      font-weight: 500;
      color: #4b3f6b;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-outline:hover {
      background: #f6f2ff;
    }

    /* 提交按钮 */
    .submit-area {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .btn-primary {
      background: #2c2640;
      color: white;
      border: none;
      padding: 1rem 3rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-primary:hover {
      background: #3f3660;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 提示消息 */
    .toast {
      background: #2c2640;
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      text-align: center;
      width: fit-content;
      margin: 1.5rem auto 0;
      font-weight: 500;
      display: none;
      box-shadow: 0 4px 12px rgba(44, 38, 64, 0.15);
    }

    .toast.show {
      display: block;
    }

    .toast.error {
      background: #b44;
    }

    /* 云端标识 */
    .cloud-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #eae5f8;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #4f417b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 头部 -->
    <div class="header">
      <div class="logo">
        <img src="/科赛帝尔.png" alt="科赛帝尔">
        <span>科赛帝尔</span>
      </div>
      <div class="cloud-badge">
        <span>☁️</span> 直传云端
      </div>
    </div>

    <!-- 标题 -->
    <div class="page-title">
      <h1>版权登记</h1>
      <p>thoy.top/korsider · 信息加密上传至云端</p>
    </div>

    <!-- 登记表单 -->
    <div class="form-card">
      <div class="section-title">👤 申请人信息</div>
      <div class="form-row">
        <div class="form-group">
          <label>姓名/名称</label>
          <input type="text" id="name" placeholder="例：李沐" value="李沐">
        </div>
        <div class="form-group">
          <label>证件号码</label>
          <input type="text" id="idNumber" placeholder="身份证/营业执照号" value="110101199001011234">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>手机号码</label>
          <input type="tel" id="phone" placeholder="手机号码" value="17649864014">
        </div>
        <div class="form-group">
          <label>电子邮箱</label>
          <input type="email" id="email" placeholder="电子邮箱" value="us@thoy.top">
        </div>
      </div>
      <div class="form-group">
        <label>通讯地址</label>
        <input type="text" id="address" value="吉林省长春市朝阳区前进大街2699号">
      </div>

      <div class="section-title" style="margin-top: 2rem;">🎨 作品信息</div>
      <div class="form-row">
        <div class="form-group">
          <label>作品名称</label>
          <input type="text" id="workName" value="星穹纪元 世界观设定集">
        </div>
        <div class="form-group">
          <label>创作日期</label>
          <input type="date" id="completionDate" value="2025-08-15">
        </div>
      </div>

      <div class="section-title" style="margin-top: 2rem;">📎 上传材料</div>
      <div class="form-group">
        <label>身份证明文件</label>
        <div class="upload-area" id="idUploadArea">
          <input type="file" id="idFile" multiple accept=".jpg,.png,.pdf">
          <div class="upload-icon">📎</div>
          <div class="upload-text">点击上传身份证/营业执照</div>
          <div class="file-list" id="idFileList"></div>
        </div>
      </div>

      <div class="form-group" style="margin-top: 1.5rem;">
        <label>作品文件</label>
        <div class="upload-area" id="workUploadArea">
          <input type="file" id="workFile" multiple>
          <div class="upload-icon">📁</div>
          <div class="upload-text">点击上传作品文件 (可多选)</div>
          <div class="file-list" id="workFileList"></div>
        </div>
      </div>

      <div class="section-title" style="margin-top: 2rem;">✍️ 电子签名</div>
      <div class="signature-pad">
        <canvas id="signatureCanvas" width="600" height="140"></canvas>
        <div class="signature-actions">
          <button class="btn-outline" id="clearSignature">清除</button>
          <button class="btn-outline" id="saveSignature">保存</button>
        </div>
      </div>

      <div class="submit-area">
        <button class="btn-primary" id="submitBtn">
          <span>☁️</span> 提交 · 上传云端
        </button>
      </div>
      
      <!-- 提示消息 - 只用于成功/失败反馈 -->
      <div id="toast" class="toast"></div>
    </div>

    <!-- 底部说明 -->
    <div style="text-align: center; margin-top: 2rem; color: #8b7fa3; font-size: 0.85rem;">
      所有数据实时传输至云端服务器 · 不保留本地
    </div>
  </div>

  <script>
    (function() {
      // ========== 配置 ==========
      const API_ENDPOINT = 'https://your-cloud-api.com/submit'; // ⚠️ 请替换为真实的云端接口地址
      
      // 上传文件展示
      function setupUpload(triggerId, inputId, listId) {
        const area = document.getElementById(triggerId);
        const input = document.getElementById(inputId);
        const list = document.getElementById(listId);
        if (!area || !input) return;

        area.addEventListener('click', () => input.click());

        input.addEventListener('change', function() {
          list.innerHTML = '';
          for (let file of this.files) {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>📄 ${file.name}</span><span>${(file.size / 1024).toFixed(1)} KB</span>`;
            list.appendChild(div);
          }
        });
      }

      setupUpload('idUploadArea', 'idFile', 'idFileList');
      setupUpload('workUploadArea', 'workFile', 'workFileList');

      // 签名画板
      const canvas = document.getElementById('signatureCanvas');
      let ctx = canvas?.getContext('2d');
      if (ctx) {
        ctx.strokeStyle = '#2c2640';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        let drawing = false;

        function start(e) {
          drawing = true;
          ctx.beginPath();
          const rect = canvas.getBoundingClientRect();
          const x = (e.clientX - rect.left) * (canvas.width / rect.width);
          const y = (e.clientY - rect.top) * (canvas.height / rect.height);
          ctx.moveTo(x, y);
        }

        function move(e) {
          if (!drawing) return;
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const x = (e.clientX - rect.left) * (canvas.width / rect.width);
          const y = (e.clientY - rect.top) * (canvas.height / rect.height);
          ctx.lineTo(x, y);
          ctx.stroke();
        }

        function stop() { drawing = false; }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        
        // 触摸事件
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); });
        canvas.addEventListener('touchend', stop);
      }

      // 清除签名
      document.getElementById('clearSignature').addEventListener('click', () => {
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
      });

      // 保存签名 (仅提示)
      document.getElementById('saveSignature').addEventListener('click', () => {
        alert('签名已保存');
      });

      // 显示提示
      function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.remove('error');
        if (isError) toast.classList.add('error');
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 5000);
      }

      // ========== 提交到真实云端 ==========
      document.getElementById('submitBtn').addEventListener('click', async function() {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>☁️</span> 上传中...';

        try {
          // 1. 收集表单数据
          const name = document.getElementById('name').value.trim() || '未填写';
          const phone = document.getElementById('phone').value.trim() || '';
          const idNumber = document.getElementById('idNumber').value.trim() || '';
          const email = document.getElementById('email').value.trim() || '';
          const address = document.getElementById('address').value.trim() || '';
          const workName = document.getElementById('workName').value.trim() || '未填写';
          const completionDate = document.getElementById('completionDate').value || '';

          // 2. 验证必填
          if (!phone) {
            showToast('手机号码是必填项', true);
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>☁️</span> 提交 · 上传云端';
            return;
          }

          // 3. 准备 FormData (支持文件上传)
          const formData = new FormData();
          
          // 添加文本字段
          formData.append('name', name);
          formData.append('phone', phone);
          formData.append('idNumber', idNumber);
          formData.append('email', email);
          formData.append('address', address);
          formData.append('workName', workName);
          formData.append('completionDate', completionDate);
          
          // 添加签名图片 (如果有)
          if (ctx) {
            const canvasData = canvas.toDataURL('image/png');
            // 将 base64 转换为 blob 上传
            const blob = await (await fetch(canvasData)).blob();
            formData.append('signature', blob, 'signature.png');
            formData.append('hasSignature', 'true');
          } else {
            formData.append('hasSignature', 'false');
          }

          // 添加身份证明文件
          const idFiles = document.getElementById('idFile').files;
          for (let i = 0; i < idFiles.length; i++) {
            formData.append('idFiles', idFiles[i]);
          }

          // 添加作品文件
          const workFiles = document.getElementById('workFile').files;
          for (let i = 0; i < workFiles.length; i++) {
            formData.append('workFiles', workFiles[i]);
          }

          // 4. 发送到云端 API
          const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            body: formData
            // 注意：不要手动设置 Content-Type，浏览器会自动设置带 boundary 的 multipart 请求
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const result = await response.json();

          // 5. 处理成功响应
          showToast('✅ 提交成功！数据已存储至云端');
          
          // 清空表单
          document.getElementById('idFileList').innerHTML = '';
          document.getElementById('workFileList').innerHTML = '';
          if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
          document.getElementById('idFile').value = '';
          document.getElementById('workFile').value = '';

        } catch (error) {
          console.error('上传失败:', error);
          showToast('❌ 上传失败，请稍后重试', true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>☁️</span> 提交 · 上传云端';
        }
      });
    })();
  </script>
</body>
</html>
