<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科赛帝尔 · 完整版权系统</title>
  <!-- favicon -->
  <link rel="icon" type="image/x-icon" href="科赛帝尔.ico">
  <link rel="shortcut icon" href="科赛帝尔.ico" type="image/x-icon">
  <!-- 字体 Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #e9dfff 0%, #dacdff 100%);
      color: #1b0b3b;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 2.5rem;
      box-shadow: 0 30px 50px -30px rgba(99, 60, 190, 0.4);
    }
    .container { max-width: 1300px; margin: 0 auto; }

    /* 导航/头部 */
    .nav-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; margin-bottom: 2rem;
      background: rgba(255,255,255,0.35); backdrop-filter: blur(10px);
      border-radius: 4rem;
    }
    .logo-area { display: flex; align-items: center; gap: 0.8rem; }
    .logo-area img { height: 48px; width: auto; }
    .logo-area span {
      font-weight: 700; font-size: 1.6rem;
      background: linear-gradient(130deg,#3f1b7b,#8d62f0); -webkit-background-clip: text;
      background-clip: text; color: transparent;
    }
    .nav-links { display: flex; gap: 1rem; }
    .nav-link {
      background: rgba(255,255,255,0.5); padding: 0.6rem 1.8rem; border-radius: 3rem;
      text-decoration: none; color: #2c0f5c; font-weight: 600; border:1px solid white;
    }
    .nav-link:hover { background: white; }

    /* 标题区 */
    .page-header { text-align: center; margin: 1rem 0 3rem; }
    .page-header h1 {
      font-size: 3.2rem; font-weight: 800;
      background: linear-gradient(145deg,#26114b,#7349cf,#b28eff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .page-header p {
      background: rgba(255,255,240,0.5); display: inline-block;
      padding: 0.3rem 2rem; border-radius: 3rem;
    }

    /* 前台卡片 */
    .form-card { padding: 2.5rem; background: rgba(255,255,255,0.45); backdrop-filter: blur(16px); border-radius: 3rem; margin-bottom: 2.5rem; }
    .section-title { font-size: 1.9rem; font-weight: 700; margin: 2rem 0 1.5rem; border-left: 8px solid #aa8aff; padding-left: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-weight: 600; color: #281552; margin-left: 0.5rem; display: flex; align-items: center; gap: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      background: rgba(255,255,255,0.7); border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 2rem; padding: 0.9rem 1.5rem; font-size: 1rem; outline: none;
    }
    .form-group input:focus { border-color: #aa86ff; background: rgba(255,255,255,0.9); box-shadow: 0 0 0 4px rgba(170,134,255,0.2); }
    .upload-area {
      background: rgba(255,255,255,0.4); border: 2px dashed #aa8aff; border-radius: 2rem;
      padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem;
    }
    .upload-area:hover { background: rgba(255,255,255,0.7); }
    .upload-area input[type="file"] { display: none; }
    .file-list { margin-top: 1rem; }
    .file-item {
      background: rgba(255,255,255,0.5); border-radius: 2rem; padding: 0.5rem 1.5rem;
      margin: 0.3rem 0; display: flex; justify-content: space-between;
    }
    .signature-pad {
      background: white; border-radius: 2rem; padding: 1rem; border: 2px solid #aa8aff;
    }
    canvas { width: 100%; height: 150px; background: white; border-radius: 1rem; cursor: crosshair; touch-action: none; }
    .signature-actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .signature-actions button {
      background: rgba(255,255,255,0.6); border: 1px solid white; padding: 0.5rem 2rem;
      border-radius: 2rem; cursor: pointer; font-weight: 600;
    }
    .btn-primary {
      background: #3f1e8f; border: none; color: white; padding: 1.1rem 3rem;
      border-radius: 3rem; font-weight: 700; font-size: 1.2rem;
      box-shadow: 0 14px 28px -10px #7e5de0; cursor: pointer; display: inline-flex; align-items: center; gap:0.8rem;
    }
    .btn-primary:hover { background: #5d35bb; transform: scale(1.02); }
    .btn-danger {
      background: #b44; border: none; color: white; padding: 0.6rem 1.5rem;
      border-radius: 3rem; font-weight: 600; cursor: pointer;
    }
    .toast {
      background: rgba(70,30,140,0.9); backdrop-filter: blur(10px); color: white;
      padding: 1rem 2.5rem; border-radius: 4rem; width: fit-content; margin: 1rem auto 0; display: none;
    }
    .toast.show { display: block; }

    /* 后台样式 (深色) */
    .admin-body { background: linear-gradient(145deg, #1a1035 0%, #2e1b55 100%); color: #f0eaff; }
    .admin-glass { background: rgba(30,20,50,0.6); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.15); }
    .login-container { max-width: 420px; margin: 5rem auto; padding: 2.5rem; }
    .admin-container { max-width: 1400px; margin: 2rem auto; display: none; }
    .stats-cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:1.5rem; margin-bottom:2rem; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius:2rem; padding:1.5rem; }
    .stat-number { font-size:2.5rem; font-weight:800; color:white; }
    .data-section { background: rgba(255,255,255,0.03); border-radius:2rem; padding:2rem; margin-bottom:2rem; }
    table { width:100%; border-collapse: collapse; }
    th { text-align: left; padding:1rem 0.5rem; color:#c3b0ff; border-bottom:1px solid rgba(255,255,255,0.1); }
    td { padding:1rem 0.5rem; border-bottom:1px solid rgba(255,255,255,0.05); color:#ece5ff; }
    .file-tag { background:rgba(170,138,255,0.2); border:1px solid rgba(255,255,255,0.2); padding:0.2rem 1rem; border-radius:2rem; font-size:0.85rem; }
    .dot-signed { width:10px; height:10px; background:#62dd9a; border-radius:50%; display:inline-block; margin-right:0.3rem; }
    .dot-unsigned { background:#ff7b7b; width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:0.3rem; }
    .view-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:0.3rem 1.2rem; border-radius:2rem; cursor:pointer; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); z-index:999; }
    .detail-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#251d3b; padding:2.5rem; border-radius:2.5rem; max-width:600px; width:90%; z-index:1000; }
    .admin-row { display: flex; gap: 2rem; margin: 2rem 0; flex-wrap: wrap; }
    .admin-card { background: rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.8rem; flex: 1; }
    .admin-card input { background: #332b4e; border: 1px solid #6655aa; color: white; padding: 0.8rem 1.5rem; border-radius: 3rem; width: 100%; margin: 0.5rem 0; }
    .user-list { margin-top: 1rem; }
    .user-item { display: flex; justify-content: space-between; align-items: center; background: #2a1f44; padding: 0.6rem 1.2rem; border-radius: 3rem; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <!-- 简单路由：前台 / 后台切换显示 -->
  <div id="app">
    <!-- 前台界面 (korsider) -->
    <div id="frontend" class="container">
      <nav class="nav-header glass-panel">
        <div class="logo-area"><img src="科赛帝尔.png" alt=""><span>科赛帝尔</span></div>
        <div class="nav-links">
          <a class="nav-link" href="#" onclick="switchToAdmin()">后台管理</a>
        </div>
      </nav>
      <div class="page-header"><h1>📚 版权登记系统</h1><p>thoy.top/korsider · 数据直传后台</p></div>
      <div class="form-card glass-panel">
        <div class="section-title">👤 申请人信息</div>
        <div class="form-row">
          <div class="form-group"><label>姓名/名称</label><input id="name" value="李沐"></div>
          <div class="form-group"><label>证件号码</label><input id="idNumber" value="110101199001011234"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>手机号码</label><input id="phone" value="17649864014"></div>
          <div class="form-group"><label>电子邮箱</label><input id="email" value="us@thoy.top"></div>
        </div>
        <div class="form-group"><label>通讯地址</label><input id="address" value="吉林省长春市朝阳区前进大街2699号"></div>

        <div class="section-title">🎨 作品信息</div>
        <div class="form-row">
          <div class="form-group"><label>作品名称</label><input id="workName" value="星穹纪元 世界观设定集"></div>
          <div class="form-group"><label>创作日期</label><input type="date" id="completionDate" value="2025-08-15"></div>
        </div>

        <div class="section-title">📎 上传材料</div>
        <div class="form-group">
          <label>身份证明文件</label>
          <div class="upload-area" id="idUploadArea"><input type="file" id="idFile" multiple accept=".jpg,.png,.pdf"><span>📎 点击上传身份证/营业执照</span><div class="file-list" id="idFileList"></div></div>
        </div>
        <div class="form-group">
          <label>作品文件</label>
          <div class="upload-area" id="workUploadArea"><input type="file" id="workFile" multiple><span>📁 点击上传作品文件</span><div class="file-list" id="workFileList"></div></div>
        </div>

        <div class="section-title">✍️ 电子签名</div>
        <div class="signature-pad"><canvas id="signatureCanvas" width="600" height="150"></canvas><div class="signature-actions"><button id="clearSignature">清除</button><button id="saveSignature">保存</button></div></div>

        <div style="display: flex; justify-content: flex-end; gap: 2rem; margin-top: 2rem;">
          <button class="btn-primary" id="submitFrontend">⛓️ 提交登记 · 自动短信通知</button>
        </div>
        <div id="frontendToast" class="toast">✨ 已提交，短信发送至手机</div>
      </div>
    </div>

    <!-- 后台界面 (admin) 初始隐藏 -->
    <div id="backend" style="display: none;">
      <!-- 登录页 -->
      <div id="loginPanel" class="admin-glass login-container">
        <div style="text-align:center; margin-bottom:2rem;"><img src="科赛帝尔.png" style="height:60px;"><h2 style="color:white;">后台管理</h2></div>
        <div class="input-group"><label style="color:#d9ccff;">用户名</label><input id="adminUser" value="admin"></div>
        <div class="input-group" style="margin-top:1rem;"><label style="color:#d9ccff;">密码</label><input type="password" id="adminPass" value="123456"></div>
        <button class="btn-primary" style="width:100%; margin-top:2rem;" id="loginBtn">登录</button>
        <div id="loginError" style="color:#ff9f9f; text-align:center; margin-top:1rem; display:none;">用户名或密码错误</div>
      </div>

      <!-- 后台主界面 -->
      <div id="adminPanel" class="admin-container">
        <div class="admin-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
          <div class="logo-area"><img src="科赛帝尔.png" style="height:45px;"><span style="color:white;">版权后台 · thoy.top/admin</span></div>
          <div><button class="view-btn" id="logoutBtn">退出</button></div>
        </div>

        <!-- 管理员工具条：添加账号 + 清空数据 + 账号列表（带删除） -->
        <div class="admin-row">
          <div class="admin-card">
            <h3 style="color:#cbb5ff;">➕ 添加管理员账号</h3>
            <input type="text" id="newUsername" placeholder="新用户名" value="operator">
            <input type="password" id="newPassword" placeholder="密码" value="pass123">
            <button class="btn-primary" id="addUserBtn" style="padding:0.8rem 2rem;">添加账号</button>
            <span id="addUserMsg" style="color:#62dd9a; margin-left:1rem;"></span>
          </div>
          <div class="admin-card">
            <h3 style="color:#cbb5ff;">🗑️ 清空全部登记数据</h3>
            <p style="color:#b1a0e0; margin:1rem 0;">清空后不可恢复，请谨慎操作</p>
            <button class="btn-primary" id="clearDataBtn" style="background:#b44; box-shadow:none;">清空所有数据</button>
            <span id="clearMsg" style="color:#ffb8b8; margin-left:1rem;"></span>
          </div>
        </div>

        <!-- 新增：现有账号列表 + 删除按钮 -->
        <div class="admin-card" style="margin-top:1rem;">
          <h3 style="color:#cbb5ff;">👥 现有管理员账号</h3>
          <div id="userListContainer" class="user-list"></div>
        </div>

        <!-- 统计数据卡片 -->
        <div class="stats-cards"><div class="stat-card"><h3>总登记</h3><div class="stat-number" id="totalCount">0</div></div><div class="stat-card"><h3>已签名</h3><div class="stat-number" id="signedCount">0</div></div></div>

        <!-- 数据表格 (国家/地方简化合并为全部) -->
        <div class="data-section">
          <h2 style="color:white;">📋 所有登记数据</h2>
          <table id="allDataTable"><thead><tr><th>姓名</th><th>手机</th><th>作品</th><th>文件</th><th>签名</th><th>操作</th></tr></thead><tbody id="dataTbody"></tbody></table>
        </div>
      </div>

      <!-- 详情弹窗 -->
      <div class="modal-overlay" id="modalOverlay"></div><div class="detail-modal" id="detailModal"><h2 style="color:white;">详情</h2><div id="modalContent"></div><button class="view-btn" id="closeModal" style="margin-top:1.5rem;">关闭</button></div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 全局数据存储 (模拟后端数据库) ----------
      let submissions = JSON.parse(localStorage.getItem('korsider_submissions')) || [
        { id: 'S001', name:'李沐', phone:'17649864014', idNumber:'110101199001011234', email:'us@thoy.top', address:'吉林省长春市...', workName:'星穹纪元', completionDate:'2025-08-15', idFiles:['身份证.jpg'], workFiles:['设定.docx'], signature: true, time: Date.now() },
        { id: 'S002', name:'星尘工作室', phone:'13944112233', idNumber:'91220102MA17X5TQ7F', email:'xingchen@oc.com', address:'北京', workName:'人设图鉴', completionDate:'2026-01-20', idFiles:['执照.jpg'], workFiles:['图鉴.pdf'], signature: true, time: Date.now()-100000 },
        { id: 'S003', name:'赵梦琪', phone:'15233448899', idNumber:'320105199503124567', email:'mengqi@foxmail.com', address:'上海', workName:'钢琴曲集', completionDate:'2025-12-10', idFiles:['身份证.jpg'], workFiles:['曲谱.pdf'], signature: false, time: Date.now()-200000 }
      ];
      let adminUsers = JSON.parse(localStorage.getItem('korsider_admin')) || [{ username: 'admin', password: '123456' }];

      function saveData() { localStorage.setItem('korsider_submissions', JSON.stringify(submissions)); }
      function saveAdmin() { localStorage.setItem('korsider_admin', JSON.stringify(adminUsers)); }

      // ---------- 前台界面逻辑 ----------
      // 上传文件展示
      function setupUpload(triggerId, inputId, listId) {
        const area = document.getElementById(triggerId); const input = document.getElementById(inputId); const list = document.getElementById(listId);
        if (!area || !input) return;
        area.addEventListener('click', () => input.click());
        input.addEventListener('change', function() {
          list.innerHTML = '';
          for (let file of this.files) {
            const div = document.createElement('div'); div.className = 'file-item';
            div.innerHTML = `<span>📄 ${file.name}</span><span>${(file.size/1024).toFixed(1)} KB</span>`;
            list.appendChild(div);
          }
        });
      }
      setupUpload('idUploadArea','idFile','idFileList');
      setupUpload('workUploadArea','workFile','workFileList');

      // 签名画板
      const canvas = document.getElementById('signatureCanvas');
      let ctx = canvas?.getContext('2d');
      if (ctx) {
        ctx.strokeStyle = '#1f0a47'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        let drawing = false;
        function start(e) {
          drawing = true; ctx.beginPath();
          const rect = canvas.getBoundingClientRect();
          const x = (e.clientX - rect.left) * (canvas.width / rect.width);
          const y = (e.clientY - rect.top) * (canvas.height / rect.height);
          ctx.moveTo(x, y);
        }
        function move(e) { if (!drawing) return; e.preventDefault(); const rect = canvas.getBoundingClientRect(); const x = (e.clientX - rect.left) * (canvas.width / rect.width); const y = (e.clientY - rect.top) * (canvas.height / rect.height); ctx.lineTo(x, y); ctx.stroke(); }
        function stop() { drawing = false; }
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', stop); canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); }); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); }); canvas.addEventListener('touchend', stop);
      }
      document.getElementById('clearSignature')?.addEventListener('click', () => ctx.clearRect(0,0,canvas.width,canvas.height));

      // 前台提交: 模拟发送到 thoy.top/admin + 自动短信
      document.getElementById('submitFrontend').addEventListener('click', function() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const idNumber = document.getElementById('idNumber').value;
        const email = document.getElementById('email').value;
        const address = document.getElementById('address').value;
        const workName = document.getElementById('workName').value;
        const completionDate = document.getElementById('completionDate').value;
        const idFiles = document.getElementById('idFile').files; 
        const workFiles = document.getElementById('workFile').files;
        // 简单模拟文件列表名称
        let idFileNames = []; for (let f of idFiles) idFileNames.push(f.name);
        let workFileNames = []; for (let f of workFiles) workFileNames.push(f.name);
        // 签名判断
        const canvasEmpty = !ctx || ctx.getImageData(0,0,1,1).data.some(v=>v!==0) === false;
        const signature = !canvasEmpty;

        const newSub = {
          id: 'S' + Math.floor(Math.random()*9000+1000),
          name, phone, idNumber, email, address, workName, completionDate,
          idFiles: idFileNames.length ? idFileNames : ['身份证待上传'],
          workFiles: workFileNames.length ? workFileNames : ['作品待上传'],
          signature: signature,
          time: Date.now()
        };
        submissions.push(newSub);
        saveData();

        // 显示toast并模拟发送短信
        const toast = document.getElementById('frontendToast');
        toast.innerText = `✨ 已提交！短信已发送至 ${phone} (模拟)`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);

        // 清空文件列表显示 (可选)
        document.getElementById('idFileList').innerHTML = '';
        document.getElementById('workFileList').innerHTML = '';
        if (ctx) ctx.clearRect(0,0,canvas.width,canvas.height);
      });

      // ---------- 后台管理逻辑 ----------
      function switchToAdmin() { document.getElementById('frontend').style.display = 'none'; document.getElementById('backend').style.display = 'block'; }
      window.switchToAdmin = switchToAdmin;

      const loginPanel = document.getElementById('loginPanel');
      const adminPanel = document.getElementById('adminPanel');
      document.getElementById('loginBtn').addEventListener('click', function() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        const found = adminUsers.find(u => u.username === user && u.password === pass);
        if (found) {
          loginPanel.style.display = 'none';
          adminPanel.style.display = 'block';
          document.getElementById('loginError').style.display = 'none';
          renderAdmin();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      });
      document.getElementById('logoutBtn').addEventListener('click', function() {
        adminPanel.style.display = 'none';
        loginPanel.style.display = 'block';
      });

      // 添加账号
      document.getElementById('addUserBtn').addEventListener('click', function() {
        const newUser = document.getElementById('newUsername').value;
        const newPass = document.getElementById('newPassword').value;
        if (newUser && newPass) {
          adminUsers.push({ username: newUser, password: newPass });
          saveAdmin();
          document.getElementById('addUserMsg').innerText = '账号已添加';
          setTimeout(() => document.getElementById('addUserMsg').innerText = '', 2000);
          renderAdmin(); // 刷新账号列表
        }
      });

      // 清空数据
      document.getElementById('clearDataBtn').addEventListener('click', function() {
        if (confirm('确定清空所有登记数据？')) {
          submissions = [];
          saveData();
          renderAdmin();
          document.getElementById('clearMsg').innerText = '数据已清空';
          setTimeout(() => document.getElementById('clearMsg').innerText = '', 2000);
        }
      });

      // 渲染后台（包含账号列表 + 删除按钮）
      function renderAdmin() {
        document.getElementById('totalCount').innerText = submissions.length;
        document.getElementById('signedCount').innerText = submissions.filter(s => s.signature).length;
        const tbody = document.getElementById('dataTbody');
        tbody.innerHTML = submissions.map(sub => `
          <tr>
            <td>${sub.name}</td>
            <td>${sub.phone}</td>
            <td>${sub.workName}</td>
            <td>📎 ${sub.idFiles?.length || 0} / 📄 ${sub.workFiles?.length || 0}</td>
            <td><span class="${sub.signature ? 'dot-signed' : 'dot-unsigned'}"></span>${sub.signature ? '已签名' : '未签名'}</td>
            <td><button class="view-btn" data-id="${sub.id}">查看</button></td>
          </tr>
        `).join('');

        // 绑定详情
        document.querySelectorAll('.view-btn[data-id]').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.dataset.id;
            const data = submissions.find(s => s.id === id);
            if (!data) return;
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
              <div style="background:#332b4e; border-radius:1.5rem; padding:1.5rem;">
                <p><strong>📌 编号：</strong>${data.id}</p><p><strong>👤 姓名：</strong>${data.name}</p>
                <p><strong>📞 手机：</strong>${data.phone}</p><p><strong>📧 邮箱：</strong>${data.email}</p>
                <p><strong>🏠 地址：</strong>${data.address}</p><p><strong>🎨 作品：</strong>${data.workName}</p>
                <p><strong>📅 创作日期：</strong>${data.completionDate}</p>
                <p><strong>🪪 身份证明：</strong> ${data.idFiles?.join('、') || '无'}</p>
                <p><strong>📁 作品文件：</strong> ${data.workFiles?.join('、') || '无'}</p>
                <p><strong>✍️ 签名：</strong>${data.signature ? '✅ 已签名' : '❌ 未签名'}</p>
              </div>
            `;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('detailModal').style.display = 'block';
          });
        });

        // 渲染账号列表 + 删除按钮（不能删除自己admin）
        const userListDiv = document.getElementById('userListContainer');
        userListDiv.innerHTML = adminUsers.map((user, index) => `
          <div class="user-item">
            <span>👤 ${user.username}</span>
            ${user.username !== 'admin' ? 
              `<button class="btn-danger" onclick="deleteUser('${user.username}')">删除</button>` : 
              '<span style="color:#aaa;">(主账号)</span>'}
          </div>
        `).join('');
      }

      // 删除账号函数（暴露到全局）
      window.deleteUser = function(username) {
        if (username === 'admin') {
          alert('不能删除主账号 admin');
          return;
        }
        if (confirm(`确定删除账号 ${username} 吗？`)) {
          adminUsers = adminUsers.filter(u => u.username !== username);
          saveAdmin();
          renderAdmin();
        }
      };

      // 关闭弹窗
      document.getElementById('closeModal').addEventListener('click', function() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('detailModal').style.display = 'none';
      });
      document.getElementById('modalOverlay').addEventListener('click', function() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('detailModal').style.display = 'none';
      });

      // 默认前台显示，后台隐藏
      document.getElementById('frontend').style.display = 'block';
      document.getElementById('backend').style.display = 'none';
    })();
  </script>
</body>
</html>
