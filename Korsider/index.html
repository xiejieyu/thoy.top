<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>负责人 · 领导人 双二维码</title>
      <link rel="icon" type="image/x-icon" href="../科赛帝尔.ico">
  <link rel="shortcut icon" href="../科赛帝尔.ico" type="image/x-icon">
    <style>
        /* 极简稳重的展示卡片 —— 开箱即用，图片名已固定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef3f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
        }

        .qr-wall {
            max-width: 720px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            padding: 2.5rem 1.8rem;
            box-shadow: 0 30px 50px -20px #1e3f5e;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .title {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .title h1 {
            font-weight: 500;
            font-size: 2.2rem;
            color: #1f4662;
            letter-spacing: 2px;
            border-bottom: 2px solid #b3cfec;
            display: inline-block;
            padding-bottom: 0.5rem;
            padding-inline: 2rem;
        }

        .title .filename-row {
            margin-top: 0.5rem;
            font-size: 1.1rem;
            background: #d7e7f5;
            padding: 0.3rem 1.8rem;
            border-radius: 40px;
            display: inline-block;
            color: #103247;
            font-weight: 500;
            box-shadow: inset 0 1px 4px #aac3db;
        }

        /* 双卡片布局 */
        .qr-pair {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem 2rem;
        }

        .qr-card {
            flex: 0 1 250px;
            background: white;
            border-radius: 2.5rem;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            box-shadow: 0 20px 30px -8px #1f3f5b70;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #ffffff;
        }

        .qr-card:hover {
            transform: scale(1.02);
            box-shadow: 0 28px 36px -12px #113753;
        }

        /* 图片相框 */
        .qr-image-frame {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f4fafd;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border: 3px solid #cee5f5;
            box-shadow: inset 0 0 0 2px white, 0 10px 14px #b8cfdf;
        }

        .qr-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;          /* 保证图片填满正方形，如果是二维码通常比例1:1，不会变形 */
            display: block;
            border-radius: 0.8rem;
        }

        /* 标签 */
        .label {
            margin-top: 1.2rem;
            width: 100%;
            background: #e3f0fa;
            text-align: center;
            padding: 0.7rem 0.5rem;
            border-radius: 4rem;
            font-weight: 600;
            font-size: 1.25rem;
            color: #15415b;
            border: 1px solid #b2d1ea;
            box-shadow: 0 2px 8px #c1d8ec inset;
        }

        .filename-badge {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #1f3b4f;
            color: white;
            font-size: 0.75rem;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-top: 0.25rem;
            display: inline-block;
            letter-spacing: 0.3px;
            border: 1px solid #749bb9;
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            background: #dcebf8;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #16445f;
            border: 1px solid white;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* 小提示：完全不需要任何修改，图片名已固定为 负责人.jpg 和 领导人.jpg */
        @media (max-width: 450px) {
            .qr-wall { padding: 1.5rem; }
            .title h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="qr-wall">
        <div class="title">
            <h1>◈ 核心团队 ◈</h1>
            <div class="filename-row">📁 负责人.jpg  ·  领导人.jpg</div>
        </div>

        <!-- 两张二维码卡片：图片名已经按您的要求写好，直接指向同目录下的 负责人.jpg 和 领导人.jpg -->
        <div class="qr-pair">
            <!-- 卡片：负责人.jpg -->
            <div class="qr-card">
                <div class="qr-image-frame">
                    <!-- ★ 图片名称已经固定为 负责人.jpg （请将图片文件放在与此HTML相同的文件夹） -->
                    <img src="负责人.jpg" 
                         alt="负责人二维码"
                         title="负责人.jpg">
                </div>
                <div class="label">
                    👤 负责人
                    <div class="filename-badge">负责人.jpg</div>
                </div>
            </div>

            <!-- 卡片：领导人.jpg -->
            <div class="qr-card">
                <div class="qr-image-frame">
                    <!-- ★ 图片名称已经固定为 领导人.jpg （请将图片文件放在与此HTML相同的文件夹） -->
                    <img src="领导人.jpg" 
                         alt="领导人二维码"
                         title="领导人.jpg">
                </div>
                <div class="label">
                    🌟 领导人
                    <div class="filename-badge">领导人.jpg</div>
                </div>
            </div>
        </div>

        <div class="footer-note">
            ⚡ 扫描上方二维码添加企微，随时为您对接版权服务
        </div>
    </div>

    <!-- 附加绝对可靠的说明（不影响视觉）：如果图片暂时不存在，浏览器会显示破碎图标，放上图片即可 -->
    <div style="position: fixed; bottom: 10px; right: 10px; background: #ffffffd0; font-size: 0.7rem; padding: 0.3rem 0.9rem; border-radius: 30px; color: #2b4f6e; border: 1px solid #c9ddec; backdrop-filter: blur(2px);">
        ✅ 固定图片名：负责人.jpg 、领导人.jpg
    </div>
</body>
</html>
