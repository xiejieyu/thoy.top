<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双名片二维码 · 负责人 & 领导人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(155deg, #eef2f5 0%, #d9e0e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 3rem;
            box-shadow: 0 30px 50px -20px rgba(20, 40, 55, 0.4),
                        0 8px 18px rgba(0,0,0,0.05),
                        inset 0 1px 2px rgba(255,255,255,0.8);
            padding: 2.2rem 2rem 2.2rem 2rem;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 520;
            letter-spacing: -0.02em;
            color: #1a2b37;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 .badge {
            background: #2a404f;
            color: white;
            font-size: 1rem;
            font-weight: 400;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #ffffff60;
        }

        .note {
            color: #3a4f5e;
            font-size: 1rem;
            background: #dce5edc0;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid white;
            backdrop-filter: blur(2px);
        }

        /* 双二维码网格 */
        .qr-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .qr-item {
            flex: 1 1 250px;
            min-width: 230px;
            background: white;
            border-radius: 2.2rem;
            padding: 1.6rem 1.2rem 1.2rem 1.2rem;
            box-shadow: 0 18px 25px -16px rgba(0,20,40,0.3), 0 0 0 1px rgba(255,255,255,0.9) inset;
            transition: transform 0.2s ease;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-item:hover {
            transform: translateY(-4px);
        }

        .label-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
            background: #ecf2f7;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #ffffff;
            width: fit-content;
            align-self: center;
        }

        .label-icon {
            font-size: 1.3rem;
        }

        .label-text {
            font-weight: 550;
            font-size: 1.2rem;
            color: #1d2c38;
            letter-spacing: 0.3px;
        }

        .label-text small {
            font-weight: 350;
            font-size: 0.85rem;
            color: #3f5a6b;
            margin-left: 5px;
        }

        .qr-wrapper {
            background: #fafcff;
            padding: 1.2rem;
            border-radius: 2rem;
            margin: 0.5rem 0 1rem 0;
            box-shadow: inset 0 2px 5px #cbd5e1, 0 8px 12px -10px #2d3f4e;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 18px;
            background: white;
            image-rendering: crisp-edges; 
            box-shadow: 0 0 0 1px #eef3f8;
        }

        .content-hint {
            background: #eef5fa;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            color: #2e4657;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #cddde9;
            margin-top: 0.2rem;
            width: 100%;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .footer-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #bacddc;
            font-size: 0.9rem;
            color: #2e4b5f;
        }

        .file-names {
            background: #1f313d;
            color: #ecf9ff;
            padding: 0.3rem 1.4rem;
            border-radius: 50px;
            font-weight: 450;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .file-names span {
            color: #ffecaa;
            font-weight: 500;
        }

        .hint {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #214151;
        }

        .hint i {
            font-style: normal;
            font-size: 1.1rem;
        }

        /* 完全内联依赖提示 */
        .lib-note {
            font-size: 0.75rem;
            color: #607586;
            text-align: right;
        }
    </style>
    <!-- 轻量二维码库 (MIT) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>
                ⬛ 双名片码
                <span class="badge">负责人 · 领导人</span>
            </h1>
            <div class="note">直接展示 · 即扫即用</div>
        </div>

        <!-- 两个二维码网格：负责人.jpg / 领导人.jpg -->
        <div class="qr-grid">
            <!-- 负责人.jpg 二维码区块 -->
            <div class="qr-item">
                <div class="label-container">
                    <span class="label-icon">👤</span>
                    <span class="label-text">负责人 <small>.jpg</small></span>
                </div>
                <div class="qr-wrapper">
                    <canvas id="qrCanvasLeader" width="240" height="240"></canvas>
                </div>
                <div class="content-hint" id="leaderHint">负责人联系信息</div>
            </div>

            <!-- 领导人.jpg 二维码区块 -->
            <div class="qr-item">
                <div class="label-container">
                    <span class="label-icon">⭐</span>
                    <span class="label-text">领导人 <small>.jpg</small></span>
                </div>
                <div class="qr-wrapper">
                    <canvas id="qrCanvasChief" width="240" height="240"></canvas>
                </div>
                <div class="content-hint" id="chiefHint">领导人专属名片</div>
            </div>
        </div>

        <!-- 底部明确显示两个文件名 -->
        <div class="footer-meta">
            <div class="file-names">
                <span>📁 负责人.jpg</span>  ·  <span>📁 领导人.jpg</span>
            </div>
            <div class="hint">
                <i>⬇️</i> 每个二维码代表对应名片
            </div>
        </div>
        <div class="lib-note">
            canvas + qrcode-generator · 完全前端生成
        </div>
    </div>

    <script>
        (function() {
            // 确保库已加载
            if (typeof qrcode === 'undefined') {
                // 降级提示（极少发生）
                const canvases = document.querySelectorAll('canvas');
                canvases.forEach(can => {
                    const ctx = can.getContext('2d');
                    ctx.fillStyle = '#f0f3f7';
                    ctx.fillRect(0, 0, can.width, can.height);
                    ctx.fillStyle = '#a03a2b';
                    ctx.font = '13px monospace';
                    ctx.fillText('lib error', 30, 120);
                });
                document.getElementById('leaderHint').innerText = '加载失败，刷新试试';
                document.getElementById('chiefHint').innerText = '加载失败，刷新试试';
                return;
            }

            // ---------- 定义两个二维码的内容 ----------
            // 负责人.jpg 可包含姓名、职位、联系方式等（示例用文本，你可以改成真实vCard或链接）
            const leaderText = 'BEGIN:VCARD\nVERSION:3.0\nFN:陈志远\nTITLE:项目负责人\nTEL;TYPE=WORK,VOICE:+86 138 0001 1234\nEMAIL:zhiyuan.chen@company.cn\nNOTE:负责人.jpg 专属二维码\nEND:VCARD';
            
            // 领导人.jpg 内容 (可以是个人名片或官网链接等)
            const chiefText = 'BEGIN:VCARD\nVERSION:3.0\nFN:张华清\nTITLE:高级领导人\nTEL;TYPE=CELL:+86 139 8888 6666\nEMAIL:huaqing.zhang@leadership.org\nNOTE:领导人.jpg 内部联系\nEND:VCARD';

            // 也可使用纯文本/网址演示，为了体现“名字.jpg”的概念，上方用了vCard。如果想用简单网址可替换：
            // const leaderText = 'https://company.cn/负责人';
            // const chiefText = 'https://leadership.org/领导人';
            // 但保留vCard更有名片感。下方展示的hint会截取前一部分。

            // 更新提示框内容 (简短展示)
            document.getElementById('leaderHint').innerText = leaderText.substring(0, 38) + '…';
            document.getElementById('chiefHint').innerText = chiefText.substring(0, 38) + '…';

            // 通用二维码绘制函数 (画布ID, 编码文本)
            function drawQrToCanvas(canvasId, text) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                
                // 使用qrcode库 (版本0自动选择，纠错M)
                const qr = qrcode(0, 'M');
                qr.addData(text);
                qr.make();

                const moduleCount = qr.getModuleCount();
                const ctx = canvas.getContext('2d');
                
                // 清空白底
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 计算边距和格子尺寸 (让二维码在画布内居中且留白)
                const padding = 16;               // 留白像素
                const availableSize = canvas.width - padding * 2;
                const cellSize = Math.floor(availableSize / moduleCount);
                const qrSize = cellSize * moduleCount;
                const offsetX = padding + Math.floor((availableSize - qrSize) / 2);
                const offsetY = padding + Math.floor((availableSize - qrSize) / 2);

                // 绘制黑色模块
                ctx.fillStyle = '#1e2b38';        // 深灰黑
                for (let row = 0; row < moduleCount; row++) {
                    for (let col = 0; col < moduleCount; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(
                                offsetX + col * cellSize,
                                offsetY + row * cellSize,
                                cellSize,
                                cellSize
                            );
                        }
                    }
                }

                // 可选极淡边框 (装饰)
                ctx.strokeStyle = '#b1c6d6';
                ctx.lineWidth = 1.2;
                ctx.strokeRect(offsetX-0.8, offsetY-0.8, qrSize+1.5, qrSize+1.5);
            }

            // 绘制两个二维码
            drawQrToCanvas('qrCanvasLeader', leaderText);
            drawQrToCanvas('qrCanvasChief', chiefText);

            // 控制台输出确认
            console.log('✅ 负责人.jpg / 领导人.jpg 二维码已生成');
        })();
    </script>

    <!-- 极简降级提示，无js时显示 -->
    <noscript>
        <div style="background:#ffddd6; padding:1rem; border-radius:99px; text-align:center; margin-top:1rem;">
            ⚠️ 您的浏览器未启用 JavaScript，无法显示二维码。
        </div>
    </noscript>
</body>
</html>
